<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>knowing more. — Studio Shot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#141210; min-height:100vh; overflow:hidden; }

.studio {
  width:100vw; height:100vh;
  position:relative;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

.backdrop {
  position:absolute; inset:0;
  background: radial-gradient(ellipse 110% 70% at 50% -10%, #2a2520 0%, #1a1712 40%, #0e0c0a 100%);
  transition: background 0.6s ease;
}
.light-key {
  position:absolute; top:-20%; left:-5%; width:70%; height:90%;
  background: radial-gradient(ellipse, rgba(255,235,180,0.07) 0%, rgba(255,220,140,0.03) 35%, transparent 65%);
  pointer-events:none;
}
.light-fill {
  position:absolute; top:0; right:-10%; width:50%; height:80%;
  background: radial-gradient(ellipse, rgba(180,210,255,0.025) 0%, transparent 60%);
  pointer-events:none;
}
.floor {
  position:absolute; bottom:0; left:0; right:0; height:45%;
  background: linear-gradient(to top, rgba(255,255,255,0.025) 0%, transparent 100%);
  pointer-events:none;
}
.vignette {
  position:absolute; inset:0;
  background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 40%, rgba(0,0,0,0.75) 100%);
  pointer-events:none; z-index:5; transition: background 0.6s ease;
}

.stage {
  position:relative; z-index:10;
  display:flex; align-items:flex-end; justify-content:center; gap:0;
  padding-bottom:100px;
}

.product {
  position:relative; display:flex; flex-direction:column; align-items:center;
  padding:0 12px; cursor:pointer;
  transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
}
.product:hover { transform: translateY(-18px); }
.product:hover .can-img { filter: brightness(1.08) contrast(1.04) saturate(0.9); }

.can-img {
  position:relative; z-index:3;
  width:clamp(340px, 30vw, 520px); height:auto; display:block; object-fit:contain;
  transition: filter 0.5s ease;
  filter: brightness(1.0) contrast(1.07) saturate(0.88);
}

.product-bal .can-img { width:clamp(360px, 32vw, 560px); }

.shadow-hard {
  position:absolute; bottom:0px; left:50%; transform:translateX(-50%);
  z-index:2; width:clamp(200px, 18vw, 340px); height:34px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.82) 0%, transparent 70%);
  filter:blur(7px);
}
.shadow-soft {
  position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
  z-index:1; width:clamp(300px, 28vw, 520px); height:64px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.42) 0%, transparent 65%);
  filter:blur(20px);
}

.color-pool {
  position:absolute; bottom:-15px; left:50%; transform:translateX(-50%);
  z-index:1; width:clamp(280px, 26vw, 480px); height:130px;
  border-radius:50%; filter:blur(38px); opacity:0.14;
}

.reflection {
  position:absolute; bottom:0px; left:50%;
  transform:translateX(-50%) scaleY(-1);
  z-index:2; width:clamp(340px, 30vw, 520px); height:auto; object-fit:contain;
  opacity:0.12;
  mask-image: linear-gradient(to top, rgba(0,0,0,0.2) 0%, transparent 60%);
  -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.2) 0%, transparent 60%);
}
.product-bal .reflection { width:clamp(360px, 32vw, 560px); }

/* Names */
.names-row {
  position:absolute; bottom:30px; left:0; right:0;
  display:flex; justify-content:center; gap:0;
  z-index:20; pointer-events:none;
}
.name-item { width:304px; text-align:center; }
.product-bal-name { width:324px; }
.name-series {
  font-size:7.5px; letter-spacing:0.4em; text-transform:uppercase;
  color:#E8920A; opacity:0.6; font-weight:600; margin-bottom:3px;
  font-family:'Inter',sans-serif;
}
.name-product {
  font-family:'Playfair Display',serif; font-size:14px;
  color:rgba(255,255,255,0.4); font-weight:400; letter-spacing:0.01em;
}
.name-product .dot { color:#E8920A; opacity:0.7; }

/* Corner brand */
.corner-brand {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  z-index:20; text-align:center;
  font-family:'Playfair Display',serif; font-size:11px;
  color:rgba(255,255,255,0.18); letter-spacing:0.04em;
}
.corner-brand .dot { color:rgba(232,146,10,0.5); }

/* Switcher */
.switcher {
  position:absolute; top:22px; right:24px; z-index:50;
  display:flex; gap:9px; align-items:center;
}
.sw-label {
  font-family:'Inter',sans-serif; font-size:8px; letter-spacing:0.3em;
  text-transform:uppercase; color:rgba(255,255,255,0.18); margin-right:2px;
}
.sw-btn {
  width:20px; height:20px; border-radius:50%; cursor:pointer;
  border:1.5px solid rgba(255,255,255,0.1);
  transition:border-color 0.2s, transform 0.15s;
}
.sw-btn:hover { transform:scale(1.15); border-color:rgba(255,255,255,0.4); }
.sw-btn.active { border-color:#E8920A; box-shadow:0 0 0 3px rgba(232,146,10,0.15); }

/* Grain canvas */
#grain-canvas {
  position:absolute; inset:0; width:100%; height:100%;
  opacity:0.04; pointer-events:none; z-index:15;
}
</style>
</head>

  <div class="switcher">

    <div class="product product-gut">

      <img class="can-img" id="img-gut" src="" alt="Gut Health"/>
    </div>
  </div>

  <div class="names-row">
    <div class="name-item"><p class="name-series">001</p><p class="name-product">Performance<span class="dot">.</span></p></div>

  </div>

  <div class="corner-brand">knowing more<span class="dot">.</span></div>
  <canvas id="grain-canvas"></canvas>
</div>

// ── FILM GRAIN ───────────────────────────────────────────
(function(){
  const c = document.getElementById('grain-canvas');
  const ctx = c.getContext('2d');
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function grain(){
    c.width = c.width;
    const id = ctx.createImageData(c.width, c.height);
    const d = id.data;
    for(let i=0;i<d.length;i+=4){
      const v=Math.random()*255; d[i]=d[i+1]=d[i+2]=v; d[i+3]=20;
    }
    ctx.putImageData(id,0,0);
    setTimeout(()=>requestAnimationFrame(grain), 80);
  }
  resize(); addEventListener('resize',resize); grain();
})();

// ── SCENES ───────────────────────────────────────────────
const SCENES = {
  dark:   { bd:'radial-gradient(ellipse 110% 70% at 50% -10%,#2a2520 0%,#1a1712 40%,#0e0c0a 100%)', body:'#141210', vig:'radial-gradient(ellipse 85% 85% at 50% 50%,transparent 40%,rgba(0,0,0,0.75) 100%)', refl:0.12, nameCol:'rgba(255,255,255,0.4)', grain:0.04 },
  cream:  { bd:'radial-gradient(ellipse 110% 80% at 50% -15%,#f8f5f0 0%,#e8e3db 45%,#d5cfc7 100%)', body:'#d5cfc7', vig:'radial-gradient(ellipse 90% 90% at 50% 50%,transparent 30%,rgba(0,0,0,0.22) 100%)', refl:0.20, nameCol:'rgba(0,0,0,0.38)', grain:0.025 },
  white:  { bd:'radial-gradient(ellipse 120% 80% at 50% -10%,#ffffff 0%,#f5f5f5 50%,#e8e8e8 100%)', body:'#e8e8e8', vig:'radial-gradient(ellipse 90% 90% at 50% 50%,transparent 35%,rgba(0,0,0,0.18) 100%)', refl:0.22, nameCol:'rgba(0,0,0,0.35)', grain:0.015 },
  marble: { bd:'radial-gradient(ellipse 120% 80% at 45% -10%,#eae6e0 0%,#d8d3cc 45%,#c8c3bb 100%)', body:'#c8c3bb', vig:'radial-gradient(ellipse 90% 90% at 50% 50%,transparent 30%,rgba(0,0,0,0.28) 100%)', refl:0.20, nameCol:'rgba(0,0,0,0.38)', grain:0.03 },
};

function setScene(key){
  const s=SCENES[key];
  document.getElementById('backdrop').style.background = s.bd;
  document.getElementById('vignette').style.background = s.vig;
  document.body.style.background = s.body;
  document.getElementById('grain-canvas').style.opacity = s.grain;
  document.querySelectorAll('.reflection').forEach(r => r.style.opacity = s.refl);
  document.querySelectorAll('.name-product').forEach(el => el.style.color = s.nameCol);
  const isDark = key==='dark';
  document.querySelector('.sw-label').style.color = isDark ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.3)';
  document.querySelector('.corner-brand').style.color = isDark ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.2)';
  document.querySelectorAll('.sw-btn').forEach(b=>b.classList.remove('active'));
  const keys=['dark','cream','white','marble'];
  document.querySelectorAll('.sw-btn')[keys.indexOf(key)].classList.add('active');
}

window.addEventListener('load', ()=>{
  document.querySelectorAll('.can-img').forEach(img=>{
    img.addEventListener('load', ()=>{
      const p = img.closest('.product');
      const ref = p.querySelector('.reflection');
      if(ref) ref.style.height = (img.offsetHeight * 0.42)+'px';
    });
  });
});
</script>
